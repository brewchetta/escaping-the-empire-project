    <h1>How To Escape The Empire For Dummies</h1>

    <!-- GIT IS YOUR LOCAL COMPUTER -->
    
    <!-- GITHUB IS THE ONLINE COMPONENT FOR GIT -->

    <!-- HOW TO INITIALIZE: git init OR IN THE VERSION CONTROL SIDEBAR Initialize Repository -->

    <!-- A REPO IS YOUR PROJECT CODE -- ALL FILES AND FOLDERS FOR YOUR PROJECT -->

    <!-- REPO IS SHORT FOR REPOSITORY >>> AND IT HAS BEEN INITIALIZED BY GIT -->

    <!-- ADDING OR STAGING MEANS WE ARE INCLUDING FILES AND FILE CHANGES FOR THE NEXT STEP -->

    <!-- COMMITTING MEANS WE ARE CREATING A SAVE STATE / CHECKPOINT -->

    <!-- PUSHING MEANS WE ARE SENDING THE FILES TO GITHUB.... -->

    <!-- IN THE SOURCE CONTROL SIDE PANEL TO SEND THIS CODE TO GITHUB CHOOSE THE PUBLISH OPTION (THE CLOUD WITH THE UP ARROW) AND FOLLOW DIRECTIONS -->

    <!-- ONCE PUBLISHED THIS'LL BE AVAILABLE ON GITHUB -->

    <!-- PUSH MEANS SEND THE NEW COMMITS AND CHANGES TO GITHUB -->

    <!-- PULL MEANS TO DOWNLOAD / INCORPORATE -->

    <!-- CLICKING THE SYNCHRONIZE BUTTON (THE SPINNING ARROWS) IN THE LOWER LEFT WILL PULL AND PUSH -->

    <!-- THE GENERAL WORKFLOW IS: WRITE CODE; ADD; COMMIT; PUSH -->

    <!-- WE CAN CREATE A NEW BRANCH BY CLICKING THE BRANCH NAME (MAIN BY DEFAULT) IN THE LOWER LEFT OF VSCODE AND THEN SELECTING "NEW BRANCH" AT THE TOP -->

    <!-- YOU CAN JUMP TO DIFFERENT BRANCHES IN VSCODE BY CLICKING THE BRANCH NAME IN THE LOWER LEFT AND THEN CHOOSING THE BRANCH AT THE TOP OF THE SCREEN -->

    <!-- PULL REQUEST IS WHEN YOU ARE ASKING FOR A BRANCH AND ALL ITS CODE TO BE PART OF THE MAIN BRANCH (OR ANOTHER BRANCH) -->

    <!-- MERGE ALSO MEANS WE ARE TAKING CODE AND MERGING IT INTO A BRANCH -->

    <!-- CLONE BASICALLY JUST MEANS DOWNLOAD LOCALLY -->
